<!DOCTYPE html>
<!-- 新手专用：简单导航页，复制就能用，后续改链接/文字即可 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人导航页</title>
    <!-- 简单美化，不用改 -->
    <style>
        body { margin: 0; padding: 50px; font-family: 微软雅黑; background: #f5f5f5; text-align: center; }
        h1 { color: #333; margin-bottom: 40px; }
        .link-box { margin: 20px 0; }
        a { display: inline-block; margin: 0 15px; padding: 12px 25px; color: #fff; background: #2486ff; text-decoration: none; border-radius: 8px; font-size: 16px; }
        a:hover { background: #1874e8; }
    </style>
</head>
<body>
    <h1>我的常用网站导航</h1>
    <!-- 第一组链接：技术相关，改href里的网址和文字即可 -->
    <div class="link-box">
        <a href="https://github.com">GitHub</a>
        <a href="https://mp.csdn.net">CSDN</a>
        <a href="https://www.szlcsc.com">立创商城</a>
        <a href="https://www.bilibili.com">B站</a>
    </div>
    <!-- 第二组链接：工具相关，可删可加 -->
    <div class="link-box">
        <a href="https://dict.youdao.com">有道翻译</a>
        <a href="https://www.doubao.com">豆包</a>
        <a href="https://kimi.moonshot.cn">Kimi</a>
    </div>
    <!-- 第三组链接：购物相关，不想要直接删掉整个div就行 -->
    <div class="link-box">
        <a href="https://www.taobao.com">淘宝</a>
        <a href="https://www.jd.com">京东</a>
    </div>
</body>
</html>
